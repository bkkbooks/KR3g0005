巳經世之亥二千二百八甲午周宣王二十一年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳伐魯立孝公丙午丁未戊申己酉庚戌辛亥壬子伐姜戎師敗于千畝遂失南國癸丑料民于太原甲寅乙卯丙辰丁巳戊午己未周宣王崩太子湼踐位是謂幽王庚申辛酉壬戌始嬖褒姒癸亥觀物篇三十經元之甲一經㑹之午七經運之戌一百八十五經世之子二千二百九甲子周幽王五年廢申后及太子宜臼以褒姒為后伯服為太子虢石父為卿乙丑丙寅丁夘戊辰己巳庚午申侯以犬戎伐周敗幽王于驪山殺之晉秦率鄭衛之君逐犬戎立太子宜臼是謂平王東徙居洛邑是謂東周辛未周平王錫晉文侯襄公命秦分岐西晉分河内壬申秦立西畤祠白帝魯惠公即位癸酉甲戌乙亥秦文公即位丙子丁丑戊寅己卯秦東徙居汧渭之間庚辰辛巳壬午癸未衛荘公即位甲申乙酉秦作鄜畤丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之丑二千二百十甲午周平王二十四年乙未晉昭侯即位丙申晉昭侯封弟成師于曲沃丁酉鄭荘公即位戊戌鄭荘公封弟段于京城己亥庚子衛公子州吁阻兵辛丑楚亂熊通弑其君代立壬寅晉亂大夫潘父弑其君昭侯入曲沃桓叔不克國人殺潘父而立君之弟平是謂孝侯癸卯甲辰乙巳丙午丁未戊申衛州吁出奔己酉庚戌晉曲沃桓叔卒子荘伯繼齊莊公卒子釐公立辛亥壬子宋桓公卒讓其弟穆公癸丑甲寅乙卯丙辰丁巳晉曲沃荘伯入翼殺其君孝侯國人逐荘伯立孝侯子是謂鄂侯戊午己未魯隠公立庚申辛酉周平王崩其孫林立是謂桓王與鄭交惡宋穆公病讓其兄之子殤公世子馮奔鄭壬戌衛公子州吁作難弑其君桓公代立宋㑹陳蔡衛三國之師伐衛殺州吁于濮國人迎公之弟晉于邢而立之是謂宣公癸亥晉曲沃荘伯以鄭邢之師攻翼王使尹氏武氏為之助翼侯出奔随荘伯叛王王使虢伐荘伯荘伯復奔曲沃晉人及虢侯立翼侯子光是謂哀侯鄭伐宋經世之寅二千二百一十一甲子周桓王三年晉翼侯自随入于鄂是謂鄂侯乙丑晉曲沃荘伯卒子稱繼是謂武公丙寅宋齊衛之君盟于瓦屋丁卯秦自汧渭之間徙居郿戊辰齊㑹魯鄭之師伐宋己巳魯亂公子翬殺其君隠公立惠公之子是謂桓公翬為之輔庚午辛未宋亂太宰華督殺司馬孔父及弑其君殤公迎穆公子馮于鄭而立之是謂荘公壬申晉曲沃武公敗晉師于汾旁獲哀侯晉人立其子是謂小子侯癸酉晉曲沃武公弑其君哀侯于曲沃甲戌周桓王以蔡衛陳之師伐鄭不利矢中王肩乙亥蔡人殺陳佗北戎伐齊鄭使公子忽救之楚伐随俾請王之號于周丙子晉曲沃武公入翼殺小子侯王使虢仲伐稱稱復歸曲沃虢仲立哀侯弟緍丁丑秦亂寧公卒三父廢世子而庚立出子是年楚熊通伐随東開地至濮上遂稱王是謂武王戊寅己卯庚辰鄭荘公卒世子忽繼宋執鄭祭仲立突是謂厲公忽奔衛祭仲専政衛宣公殺其二子伋壽辛巳衛宣公卒子朔立是謂惠公壬午齊㑹宋衛燕伐魯不利癸未秦三父殺出子而立世子是謂武公齊釐公卒世子諸兒繼是謂襄公宋㑹齊蔡陳伐鄭甲申周桓王崩太子佗嗣立是謂荘王鄭祭仲殺雍紏而逐厲公迎忽反政是謂昭公秦伐彭戲氏于華山齊襄公削公子無知禄宋㑹魯衛陳伐鄭乙酉衛公子伋夀傅逐惠公立伋之弟黔牟公出奔齊宋㑹魯衛陳蔡伐鄭丙戌秦夷三父族鄭髙渠彌弑其君昭公立其弟子亹彌専政丁亥周有黒肩之難齊襄公殺魯桓公于濼立其子同是謂荘公又㑹諸侯于首止殺鄭子亹髙渠彌逃歸與祭仲迎公子嬰于陳立之戊子周王姬下嫁于齊己丑周塟桓王庚寅辛卯周伐随責尊楚也齊伐紀紀侯大去其國楚王卒于伐随子貲繼是謂文王始都郢壬辰齊㑹宋魯陳蔡伐衛入惠公癸巳衛惠公復入殺二公子傅黔牟奔周經世之卯二千二百一十二甲午周荘王十年秦滅小虢乙未齊公子無知以葵丘之戍人入弑襄公代立公子糾奔魯小白奔莒丙申齊人殺無知公子小白入是謂桓公紏後入不克齊伐魯殺紏其傅召忽死之管仲請囚又相桓公丁酉魯敗齊師于長勺敗宋師于乗丘楚敗蔡師于莘以蔡侯獻舞歸自是江漢之國皆服于楚戊戌己亥周荘王崩太子胡齊嗣位是謂釐王宋亂南宫萬弑其君湣公及其大夫仇牧太宰華督立公子㳺羣公子奔蕭攻萬及殺游立公弟御説是謂桓公庚子齊㑹宋陳蔡邾之師伐魯三敗之取遂又㑹魯于柯遂復其侵地曹沫刼盟故也辛丑齊㑹陳曹及王人伐宋楚師入蔡壬寅齊桓公㑹宋陳衛鄭之君盟于鄄晉曲沃武公滅翼以重寳入周得請為諸侯癸卯齊桓公㑹陳宋魯衛鄭許􅉸滕之君盟于幽秦武公卒弟徳公立楚滅鄧甲辰周釐王崩太子閔嗣位是謂恵王晉武公卒子獻公詭諸繼秦徙居雍楚文王卒世子囏繼是謂杜敖乙巳秦徳公卒子宣公繼丙午丁未周有五大夫之難邊伯石速蒍國以蔡衛之師攻王立弟頽王出居鄭之櫟戊申鄭厲公及虢叔入王于成周殺頽而執仲父及五大夫難遂平己酉秦作密畤敗晉師于河晉伐驪獲女以為姬陳公子完奔齊楚亂弟惲殺其君囏代立是謂成王庚戌楚脩好于周及諸侯辛亥魏惠公卒子懿公繼壬子晉有驪姬之難殺羣公子自翼徙居絳癸丑晉伐虢責内羣公子也甲寅周惠王錫齊桓公命為伯乙卯晉城曲沃及蒲楚伐鄭丙辰丁巳齊伐山戎至于孤竹以救燕俾脩貢天子秦宣公卒弟成公立楚殺令尹子元以鬭榖於菟為令尹戊午己未魯亂叔牙弑其君荘公開立是謂湣公季友立世子班不克奔陳庚申晉滅霍魏耿以耿封趙夙以魏封畢萬辛酉魯亂慶父以荘姜弑湣公代立季友逐慶父而立公子申是謂僖公狄滅衛殺懿公齊桓公攘戎狄而立戴公東處渡河野處漕邑戴公卒弟燬立是謂文公自漕邑徙居楚丘晉伐東山臯落氏秦成公卒弟任好立是謂穆公壬戌秦伐茅津齊㑹宋鄭魯曹邾之君于檉癸亥齊城楚丘以居衛又㑹江黄之君于貫晉滅虢經世之辰二千二百一十三甲子周惠王二十年齊㑹江黄之君于陽榖乙丑齊㑹宋魯衛鄭許曹之師伐蔡遂入楚盟于召陵執陳轅濤塗晉殺世子申生公子重耳走蒲夷吾奔屈秦娶晉女為夫人丙寅齊桓公㑹陳宋魯衛鄭許曹之君及王世子盟于首止晉伐蒲重耳奔翟又伐虞及虢虢君奔周是年秦始得志于諸侯百里奚蹇叔為之輔楚滅弦丁卯齊伐鄭晉伐屈夷吾奔梁戊辰己巳周惠王崩太子鄭嗣位是謂襄王太叔作難齊師宋衛許曹陳㑹王人于洮晉伐翟不利于齧桑庚午齊桓公㑹宰孔周公及宋衛鄭許曹之君于葵丘宋襄公立晉獻公卒公子奚齊立大夫里克及丕鄭殺之大夫荀息立其弟卓子辛未晉里克殺其君卓子及大夫荀息而納夷吾夷吾入是謂惠公惠公既立殺里克而絶秦壬申周亂叔帶以戍伐周秦晉来救癸酉齊使管仲平周難楚滅黄甲戌齊桓公㑹宋陳魯衛鄭許曹之君盟于鹹晉饑秦輸之粟乙亥秦饑晉閉之糴而又伐之楚滅英丙子齊桓公㑹宋陳魯衛鄭許曹之君盟于牡丘以救徐管仲卒易牙專政秦伐晉敗之于韓原獲其君夷吾夷吾獻河西地乃得還仍以世子圉為質丁丑戌攻周齊㑹諸侯師戍周又㑹宋魯陳鄭許邢曹之君于淮以全鄫戊寅齊桓公卒五公子争國公子無詭立易牙專政世子昭出奔宋己卯宋㑹曹衛邾伐齊無詭子敗四公子立世子昭是謂孝侯狄伐衛庚辰秦滅梁辛巳壬午宋襄公㑹楚陳蔡鄭許曹六國之君于盂楚成王執宋襄公于㑹以伐宋盟而釋之癸未齊入王叔帶于周秦晉徙陸渾之戎于伊川宋㑹衛許滕伐鄭不利晉公子圉自秦逃歸楚救鄭大敗宋師于泓甲申周頽叔桃子以狄師伐鄭遂以狄女隗氏為后宋襄公卒子成公壬臣繼齊伐宋楚伐陳乙酉周襄王廢狄后頽叔桃子以狄師攻周王出居鄭之汜叔帶代立與狄后居于温晉有郤苪之難惠公卒世子圉繼是謂懐公秦穆公使人殺之而立公子重耳是謂文公趙衰為原大夫專政丙戌秦晉之師滅王叔帶于温而納王于成周王享晉文公于郟而命益之河内地衛文公卒世子成公鄭繼楚圍陳以入頓子丁亥宋背楚親晉楚滅䕫伐宋又伐齊戊子齊孝公卒弟潘父殺世子代立是謂昭公晉救宋作三軍楚使子玉伐宋己丑周襄王狩于河陽晉㑹齊宋蔡秦之師伐衛大敗楚師于城濮遂㑹齊宋蔡鄭魯衛之君盟于踐土楚救鄭不利殺令尹子玉得臣庚寅晉㑹王人及諸侯于翟泉辛卯衛成公自陳如周周請晉納成公于衛而誅大夫元咺及公子瑕秦晉圍鄭壬辰魯取濟西田衛徙居帝丘癸巳晉文公卒世子歡繼是謂襄公經世之巳二千二百一十四甲午周襄王二十五年秦穆公伐鄭晉敗秦師于殽獲其帥孟明視西乞術白乙丙魯僖公卒世子興繼是謂文公乙未晉歸秦三帥楚亂世子商臣殺其君惲代立是謂穆王丙申秦伐晉不利于彭衙丁酉秦伐晉取王官楚伐江晉師来救戊戌秦伐西戎破國十二楚滅江己亥晉趙成子衰卒子盾繼事楚滅六庚子秦穆公卒世子罃繼是謂康公葬穆公三良為殉晉襄公卒辛丑晉世子夷臯繼是謂靈公宋成公卒國亂弟禦殺世代立國人殺禦公立子杵臼是謂昭公齊率宋衛陳鄭許曹之君㑹趙盾于扈壬寅周襄王崩太子壬臣嗣位是謂頃王癸卯周葬襄王晉㑹諸侯人救鄭秦伐晉取武遂甲辰晉伐秦取少梁秦伐晉取比徴乙巳魯敗狄于鹹獲其帥喬如丙午秦伐晉取覊馬丁未楚穆王卒世子莒繼是謂荘王戊申周頃王崩國亂公卿争權晉趙盾平周亂而立王子班是謂匡王宋及諸侯盟于新城齊昭公卒國亂公子商人殺世子舍代立是謂懿公己酉秦伐蔡齊伐魯庚戌齊脩郪丘之盟宋人弑其君昭公弟鮑立是謂文公楚滅庸辛亥晉㑹衛陳鄭伐宋壬子魯文公卒于臺下襄仲殺世子惡而立公子俀是謂宣公三桓專政秦康公卒世子稻繼是謂共公齊亂大夫丙歜弑其君懿公立公子元是謂恵公宋亂羣公子作難癸丑齊取魯濟西田晉伐鄭楚侵陳及宋甲寅周匡王崩弟瑜立是謂定王鄭敗宋師于大棘獲其太宰華元晉伐鄭秦伐晉晉趙盾弑其君靈公迎襄公弟黒臀于周立之是謂成公乙卯周葬匡王楚伐陸渾之戎遂觀兵于周郊丙辰鄭亂公子作難丁巳晉伐陳以救鄭秦共公卒子繼是為桓公戊午晉趙盾衛孫免侵陳己未晉㑹諸侯于黒壤庚申晉伐秦楚滅舒蓼辛酉晉侯㑹宋衛陳鄭于扈陳不至遂伐陳晉成公卒于扈公子據立是謂景公趙盾卒子朔繼事壬戌齊歸魯濟西田齊惠公卒子無野立是謂頃公大夫崔杼奔衛陳亂夏徴舒弑其君靈公晉伐鄭楚師来救楚伐鄭晉師来救癸亥楚伐陳誅夏徴舒納公孫寧儀行父于陳經世之午二千二百一十五甲子周定王十年楚伐鄭大敗晉師于河上晉屠岸賈作難于下宫殺趙朔及其族朔妻匿于公宫生武乙丑楚伐宋丙寅楚圍宋丁卯周定王殺二伯晉滅赤狄及潞氏戊辰周宣王榭火晉滅申氏又平王室之亂己巳晉㑹諸侯之君于斷道庚午魯宣公卒世子黒肱繼是謂成公晉伐齊楚荘王卒世子審繼是謂共王辛未周伐茅戎不利壬申齊伐魯衛敗魯之師于新築晉㑹諸侯之師救衛大敗齊師于鞌宋文公卒子瑕繼是謂共公華元專國兩盟于晉楚㑹十國之人于蜀癸酉晉㑹宋衛魯曹伐鄭鄭兩伐許甲戌晉伐楚救鄭乙亥周定王崩太子夷嗣位是謂簡王晉㑹齊宋衛魯鄭曹邾杞八國之君盟于蟲牢楚伐鄭丙子楚伐鄭晉救鄭是年壽夢稱王于吳丁丑晉㑹齊宋魯衛曹邾莒八國之君于馬陵以救鄭吳王壽夢始通好中國戊寅晉殺大夫趙同趙括己卯晉㑹齊宋魯衛鄭曹邾杞八國之君盟于蒲齊頃公卒子環繼是謂靈公晉伐鄭秦伐晉楚伐莒入鄆庚辰晉景公有疾授世子州蒲位是謂厲公景公卒程嬰攻屠岸賈于公宫滅其族復趙武趙朔之封邑程嬰請死辛巳秦晉脩夾河之盟壬午晉楚同盟于宋晉敗狄于交剛癸未魯成公朝于周晉㑹齊宋魯衛鄭曹邾滕八國之師伐秦敗之麻隧甲申秦桓公卒子景公繼乙酉晉㑹諸侯之君于戚宋共公卒國亂大司馬唐山殺世子肥右師華元左師魚石誅唐山而立公子成是謂平公楚遷許于葉吴大㑹諸侯之君于鍾離丙戌晉伐鄭大敗楚師于鄢陵楚救鄭不克矢中王目誅令尹側丁亥晉㑹諸侯盟于柯陵是年晉殺三郤戊子晉亂欒書弑其君厲公迎公子周于周立之是謂悼公魯成公卒子午繼是謂襄公楚㑹鄭伐宋彭城晉侯㑹宋公魯仲孫蔑衛侯邾子齊崔杼同盟于虚朾己丑周簡王崩太子泄心嗣位是謂靈王晉㑹諸侯之師伐宋圍彭城庚寅周葬簡王晉伐鄭㑹諸侯之師于戚以城虎牢辛卯晉㑹八國之君盟于雞澤楚伐吴至于衡山壬辰晉用魏絳楚伐陳癸巳晉㑹諸侯之師于戚城又救陳吴㑹魯衛之君于善道經世之未二千二百一十六甲午周靈王五年乙未晉㑹七國之君于鄬丙申晉㑹諸國之君于邢丘鄭子駟殺羣公子丁酉秦伐晉晉㑹十一國之君伐鄭楚亦伐鄭兩盟晉楚戊戌晉率十一國之君㑹吴壽夢于柤以滅偪陽又㑹十一國之師伐鄭又伐秦楚伐宋又救鄭己亥晉兩㑹十一國之師伐鄭賜魏絳食采安邑秦伐晉救鄭魯三桓分軍楚伐鄭又伐宋庚子楚㑹秦伐宋吴壽夢卒長子諸樊繼辛丑楚共王卒子昭廢世子代立是謂康王吴伐楚不利壬寅晉率齊宋魯衛鄭曹莒邾滕薛杞小邾十二國之君㑹吴諸樊于向又㑹諸侯之師伐秦衛亂孫林父寗殖作難衛侯出奔齊楚伐吴有功癸卯晉悼公卒子彪繼是謂平公甲辰晉侯㑹宋魯衛鄭曹莒邾薛杞小邾十國之君盟于溴梁執莒子邾子以歸又伐楚至于方城乙巳丙午晉用范中行㑹宋衛魯鄭曹莒邾滕薛杞小邾十一國之師伐齊敗之于靡下進圍臨淄齊靈公奔莒丁未齊廢世子光以公子牙為世子崔杼復廢牙立光為世子靈公卒光繼是謂荘公崔杼當國鄭簡公誅大夫子孔以子産當國戊申晉侯㑹十二國之君盟于澶淵己酉晉侯㑹八國諸侯盟于商壬欒盈奔楚庚戌晉㑹十一國之君盟于沙随楚殺令尹子南晉欒盈自楚適齊辛亥欒盈自齊復入于晉不克死范中行滅欒氏之族齊伐晉取朝歌壬子晉㑹十一國之君于夷儀楚伐吴又㑹諸侯伐鄭癸丑齊亂崔杼弑其君荘公立異母弟杵臼是謂景公崔杼為右相慶封為左相晉敗齊師于髙堂楚㑹陳伐鄭及滅舒鳩吴伐楚不利諸樊死弟餘祭立封季札于延陵甲寅衛亂寗喜孫林父争權林父不勝奔晉寗喜弑其君剽晉執寗喜求衛侯于齊而納之封林父于宿齊慶封夷崔杼族而專國鄭封子産六邑楚㑹陳蔡伐鄭乙卯晉用趙武為正卿是為文子與韓宣子起魏武子絳同執國命㑹諸侯之大夫于宋衛殺甯喜晉楚齊秦同㑹于宋從向戌之請將弭兵也丙辰周靈王崩太子貴嗣位是謂景王齊慶封弛政其子舍及田鮑髙欒之徒逐之慶封奔魯又適吴楚康王卒世子麋繼是謂郟敖丁巳晉智伯㑹十國諸侯入城杞楚用叔圍為令尹吴亂餘祭遇弑弟餘昧立季札使魯齊鄭晉戊午蔡亂世子弑其君代立鄭亂羣公子争寵宋災晉㑹諸侯人于澶淵己未魯襄公卒世子又卒國人立齊歸之子禂是謂昭公季武子專政庚申晉趙武㑹諸侯之大夫于虢楚亂令尹圍弑其君麋代立是謂靈王公子比奔晉薳罷為令尹辛酉晉韓宣子起使魯壬戌魯昭公朝晉齊晏嬰使晉鄭伯朝晉又朝楚癸亥楚㑹十一國之君于申執徐子于㑹又㑹七國諸侯伐吴之朱方以誅齊慶封吴㧞楚三邑經世之申二千二百一十七甲子周景王八年楚㑹諸侯伐吴秦景公卒世子繼是謂哀公己丑齊北伐燕楚東伐吴敗楚師于乾谿丙寅楚起章華臺丁卯楚滅陳執其公子招放之于越戊辰己巳晉平公卒世子夷繼是謂昭公齊陳鮑逐欒髙氏于魯分其室庚午晉韓起㑹齊宋魯衛鄭曹杞之大夫于厥愸楚誘蔡侯于申殺之公子棄疾滅蔡守之執其世子有歸用之辛未魯朝晉楚伐徐壬申晉昭公㑹齊衛鄭曹莒邾滕薛杞小邾之君盟于平丘魯不得與執季孫意如以歸楚公子比代立是謂平王釋陳蔡二君歸國吴滅州来癸酉楚復諸侯侵地觀從用政甲戌晉伐鮮虞楚費無忌為太子建逆婦于秦吴餘昧卒季札逃國人立餘昧子僚乙亥晉昭公卒子去疾立是謂頃公楚誘戎蠻子殺之丙子晉滅陸渾之戎吴伐楚丁丑周鑄大錢宋衛陳鄭災楚遷許于白羽戊寅楚用費無忌専政放太子建于城父己卯齊景公與大夫晏嬰入魯問禮宋有華氏之難大夫華亥華定向寧奔陳楚世子建自城父奔宋又適鄭又適晉楚殺其傅伍奢及其子尚伍員奔呉庚辰宋華亥華定向寧入宋南里叛辛巳周景王崩葬景王王室亂三王子争國國人立猛是謂悼王王子朝殺猛代立晉逐朝而入丐是謂敬王宋華亥華定向寧奔楚世子建及晉師襲鄭不克死其子勝奔吴壬午召氏尹氏入王子朝于成周單子劉子以王出奔狄泉楚徙都鄂囊瓦子常為令尹吴伐楚敗陳蔡頓胡沈之師于雞父滅胡沈獲陳夏齧楚建之子勝啟之也癸未楚城郢吴公子光伐楚㧞巢及鍾離二子争桑故也甲申魯有二王之難昭公奔齊齊景公唁之于野井晉趙鞅㑹宋魯衛曹邾滕薛小邾之人于冀父乙酉晉趙鞅㑹諸侯之師入王于成周召尹二氏之族以王子朝奔楚楚平王卒世子軫繼是謂昭王丙戌晉韓趙魏三家大滅公族祁氏羊舌氏分其地楚令尹子常誅費無忌吴季札使晉公子光弑其君僚代立是謂闔廬專諸伍員為相丁亥魯昭公自鄆如晉次于乾侯楚大夫伯嚭奔吴戊子己丑晉頃公卒世子午繼是謂定公吴滅徐以侵楚庚寅晉定公使大夫荀躒納魯昭公不克吴伐楚㧞舒辛卯晉韓不信㑹齊宋魯曹鄭莒薛杞小邾之師城成周魯昭公卒于乾侯三桓立其弟宋是謂定公吴伐越壬辰晉人執宋仲㡬于京師楚令尹子常敗吴師于豫章癸巳吴敗楚師于豫章經世之酉二千二百一十八甲午周敬王十三年乙未晉定公㑹劉子宋蔡魯衛陳鄭許曹莒邾頓胡滕薛杞小邾之君及齊大夫于召陵以伐楚楚昭公北伐蔡吴師入郢令尹子常奔鄭昭王奔鄖又奔随使申包胥求救于秦許徙君容城吴子闔廬敗楚師于柏舉五戰及郢遂入其國燒其宫平其墓伍子胥為之也丙申魯陽貨囚季氏秦救楚敗呉師于稷楚昭王自鄖復歸于郢封吴夫概于堂谿越乗虚破吴入其國吴王弟夫槩自堂谿亡歸代立闔廬逐夫槩夫槩奔楚丁酉周有儋翩之難王出居姑猶楚去郢復都鄀鄭滅許戊戌晉師入周敬王于成周齊取鄆為陽虎邑己亥魯有陽虎之難攻三桓不克竊寳玉大弓走陽關庚子秦哀公卒子惠公繼辛丑魯以孔丘為司冦從定公㑹齊景公于夾谷齊復魯侵地晏嬰在㑹壬寅宋公之弟辰及大夫仲陀石彄公子地自陳入于蕭以叛鄭子産卒癸卯孔子去魯適衛甲辰魯孔子在衛晉六卿相攻乙巳衛世子蒯聵奔宋魯孔子自衛之宋又如陳楚㑹吴伐陳滅頓吴王闔廬伐越不利死子夫差立以伯嚭為太宰是年於越句踐敗吴師于檇李稱王于㑹稽丙午魯定公卒子蔣繼是謂哀公楚滅胡丁未晉趙鞅圍范中行氏于朝歌中行走邯鄲楚㑹陳随許圍蔡吴敗越于夫椒伏而釋之越王句踐伐吴不利使大夫文種行成委質以臣妾遂棲于㑹稽戊申衛靈公卒其孫輒立晉趙鞅㑹陽虎以師入衛世子蒯瞶不克居之于戚城魯孔子復過宋楚伐蔡吴徙蔡于州来於越范蠡歸國己酉秦惠公卒子悼公繼魯孔子在陳庚戌魯孔子之蔡辛亥齊伐宋晉伐衛齊景公卒子荼繼是謂孺子晉韓趙魏敗范中行氏于邯鄲壬子齊亂田乞弑其君孺子迎公子陽生于魯而立之是謂悼公髙昭子死國惠子奔莒魯孔子復至陳楚昭王救陳軍于城父卒于師世子章繼是謂惠王吴伐陳魯伐邾宋伐曹癸丑吴㑹魯于鄫以伐齊徴百牢于魯甲寅宋滅曹楚令尹子西召平王世子建之子勝于吴以為巢大夫號白公吴伐魯盟于城下而還乙卯宋伐鄭楚伐陳吴伐齊丙辰齊田乞卒子常繼事是謂成子齊亂鮑子弑其君悼公立其子壬是謂簡公田常專國魯孔子自陳復至于衛楚伐陳吴㑹魯伐齊以救陳殺大夫伍員丁巳孔子自衛返魯子貢使齊及吴越晉齊伐魯吴救魯敗齊師于艾陵越朝吴戊午楚白公勝復奔吴子西復召之吴㑹魯衛之君于槖臯移兵攻晉己未晉定公及諸侯㑹吴夫差于黄池越伐吴入其郛執其世子友而還庚申魯西狩獲麟齊田常殺相闞止及弑其君簡公于舒州立其弟驁是謂平公割安平以東自為封邑孔子請討不克秦悼公卒子厲公繼晉伐鄭宋桓魋出奔衛又奔齊楚巢大夫白公勝殺令尹子西逐其君代立辛酉魯使子服景伯使齊子貢為介齊歸魯侵地衛世子蒯瞶自戚入是謂荘公輒出奔魯楚葉公以兵入誅白公而迎章復位滅陳而縣之壬戌魯孔子卒癸亥晉伐衛荘公出奔國人立公子班師齊伐衛執班師而立公子起越敗吴師于笠澤經世之戌二千二百一十九甲子周敬王四十三年衛石圃逐其君起而迎輒復位起奔齊乙丑周敬王崩太子嗣位是謂元王齊田常卒子盤繼事是謂襄子吴㑹齊晉之師伐楚越伐吴丙寅晉定公卒子鑿繼之智伯伐鄭取九邑越人伐吴丁卯越伐吴圍其國戊辰越滅吴破姑蘇殺其王并其大夫北㑹諸侯于徐致貢于周太宰范蠡辭禄遊五湖殺大夫文種遂兼有吴地己巳庚午辛未周元王崩太子介嗣位是謂貞定王壬申癸酉魯季康子卒三桓作難弑其君哀公立其子寧是謂悼公甲戌乙亥丙子丁丑晉伐鄭戊寅己卯庚辰秦伐大荔辛巳壬午癸未晉趙簡子鞅卒子母䘏繼是謂襄子同知伯韓康子魏桓子滅范中行氏四分其地及逐其君立公孫驕是謂哀公秦取晉武城甲申晉伐秦復武城乙酉齊平公卒子積繼是謂靈公晉知伯及韓魏二家兵攻趙襄子于晉陽丙戌晉三家兵圍晉陽丁亥晉韓康子魏桓子復合趙襄之兵攻知伯滅之于晉陽三分其地齊田盤卒子白繼事是謂荘子戊子己丑庚寅辛卯壬辰癸巳經世之亥二千二百二十甲午周貞定王二十三年楚滅蔡乙未秦厲公卒子躁公繼丙申秦伐義渠獲其王以歸楚滅杞東開地至泗上丁酉戊戌己亥周貞定王崩太子去疾嗣位是謂哀王王叔襲殺哀王代立是謂思王庚子周亂少弟嵬殺其王叔代立是謂考王辛丑晉哀公疾子栁繼是謂幽公公室止有綘及曲沃壬寅癸卯甲辰乙巳丙午丁未戊申己酉秦躁公卒弟懐王立楚惠王卒子中繼是謂簡王庚戌魯悼公卒子元公繼楚滅莒辛亥壬子癸丑秦庻長黽弑其君懐公立躁公孫是謂靈公甲寅乙卯周考王崩太子午嗣位是謂威烈王河南惠公封其少子于鞏稱東周君丙辰晉趙襄子卒兄之子浣繼事是謂獻子治中牟魏桓子卒子斯繼事是謂文侯丁巳趙桓子卒國人殺其子而迎獻子復位戊午秦攻魏少梁己未秦作上下畤庚申辛酉魏文侯殺晉幽公立其弟止是謂烈公壬戌癸亥皇極經世書卷五下
