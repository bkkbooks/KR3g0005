body:
  text: 皇極經世書卷五上宋邵雍撰觀物篇二十五經元之甲一經㑹之巳六經運之癸一百八十經世之子二千一百四十九經世之丑二千一百五十經世之寅二千一百五十一經世之卯二千一百五十二經世之辰二千一百五十三經世之巳二千一百五十四經世之午二千一百五十五經世之未二千一百五十六甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰唐帝堯肇位于平陽號陶唐氏命羲和欽若昊天厯象日月星辰敬授人時朞三百六旬有六日以閏月定四時成嵗曰載建寅月為始允釐百工庻績咸熈乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之申二千一百五十七甲子唐帝堯二十一年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之酉二千一百五十八甲午唐帝堯五十一年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子鯀治水績用弗成癸丑帝堯求禪明明揚側陋始徴舜登庸歴試諸難釐降二女於溈汭作嬪于虞以觀法焉甲寅乙卯舜言底可績帝以徳薦于天而命之位丙辰正月上日舜受命于文祖用璇璣玉衡以齊七政類于上帝禋于六宗望于山川徧于羣神輯五瑞五玉班于羣后肇十有二州封十有二山四時行廵狩協時月正日同律度量衡脩五禮象以典刑流共工于幽州放驩兠于崇山竄三苖于三危殛鯀于羽山四罪正而天下咸服丁巳戊午己未庚申辛酉壬戌癸亥經世之戌二千一百五十九甲子虞帝舜九年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌月正元日舜格于文祖號有虞氏都蒲坂詢四岳闢四門明四目達四聰咨十有二牧命九官以伯禹為司空稷司農契司徒臯陶司士垂司工益司虞夷司禮䕫典樂龍司言此九人使宅百揆三載考績黜陟幽明庻績其凝丁亥戊子己丑庚寅辛卯壬辰癸巳經世之亥二千一百六十甲午虞舜帝三十九年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰帝舜求代以功薦禹于天而命之位丁巳正月朔旦禹受命于神宗正天下水土分九州九山九川九澤㑹于四海修其六府咸則三壤成賦中邦戊午己未庚申辛酉壬戌癸亥觀物篇二十六經元之甲乙經㑹之午七經運之甲一百八十一經世之子二千一百六十一甲子夏王禹八年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉帝舜陟方乃死甲戌禹都安邑徙居陽翟大㑹諸侯于塗山執玉帛者萬國防風氏後至戮焉乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未夏王禹東廵狩至于㑹稽崩元子啟踐位甲申啟與有扈戰于甘之野乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰夏王啟崩元子太康踐位癸巳經世之丑二千一百六十二甲午夏王太康二年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉夏王太康失邦盤逰無度畋于有洛之表十旬不返有窮后羿因民不忍距于河而死子仲康立壬戌命𦙍侯征羲氏和氏癸亥經世之寅二千一百六十三甲子夏王仲康三年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌夏王仲康崩子相繼立依同姓諸侯斟灌斟鄩氏乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之卯二千一百六十四甲午夏王相二十年乙未丙申丁酉戊戌己亥庚子辛丑壬寅寒浞殺有窮后羿使子澆及豷伐斟灌斟鄩氏以滅相相之臣靡逃于有鬲氏相之后還于有仍氏遂生少康癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經世之辰二千一百六十五甲子夏王少康生二十三年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午夏之遺臣靡自有鬲氏收斟灌鄩二國之燼以滅寒浞而立少康少康立滅澆于過滅豷于戈以絶有窮氏之族癸未甲申乙酉丙戌丁亥戊子己丑庚寅卒卯壬辰癸巳經世之巳二千一百六十六甲午夏王少康五十三年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯夏王少康崩子杼踐位甲辰乙巳丙午丁未戊申巳酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申夏王杼崩子槐踐位辛酉壬戌癸亥經世之午二千一百六十七甲子夏王槐四年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌夏王槐崩子芒踐位丁亥戊子己丑庚寅辛卯壬辰癸巳經世之未二千一百六十八甲午夏王芒八年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰夏王芒崩子泄踐位乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申夏王泄崩子不降踐位辛酉壬戊癸亥經世之申二千一百六十九甲子夏王不降四年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經世之酉二千一百七十甲午夏王不降三十四年乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未夏王不降崩弟扃立庚申辛酉壬戌癸亥經世之戌二千一百七十一甲子夏王扃五年乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰夏王扃崩子厪踐位辛巳壬午癸未甲申乙酉丙戌丁亥