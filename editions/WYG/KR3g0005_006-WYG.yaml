body:
  text: 皇極經世書卷六上宋邵雍撰觀物篇三十一以運經世七經元之甲一經㑹之午七經運之巳一百八十六經世之子二千二百二十一甲子周威烈王九年魏城少梁乙丑秦靈公卒季父立是謂簡公丙寅丁卯魏伐秦韓伐鄭戊辰齊伐晉魏伐中山己巳庚午齊田莊子卒子太公和繼趙城平城辛未魯元公卒子顯繼是謂穆公壬申晉韓武子卒子景侯度繼趙獻子卒子烈侯籍繼魏伐秦癸酉韓伐鄭取雍邱魏滅中山楚簡王卒子當繼是謂聲王甲戌鄭伐韓取負黍乙亥宋昭公卒子悼公購繼趙以田公仲為相丙子齊宣公卒子康公貸繼田惠以廪邱叛丁丑戊寅晉韓趙魏求為諸侯于周己卯周威烈王崩太子驕嗣位是謂安王楚聲王遇盜卒子疑立是謂悼王庚辰秦攻魏陽狐辛巳秦簡公卒子惠公繼韓景侯卒子烈侯繼趙烈侯卒弟武侯立魏文侯以卜子夏段干木為師西門豹為將守鄴呉起為將守西河田成子為相樂羊為將同韓趙伐楚至于乗丘壬午癸未甲申韓盜殺相俠累乙酉丙戌晉烈公卒子孝公繼丁亥戊子魏伐鄭取酸棗又敗秦軍于注楚伐韓取負黍己丑庚寅齊田和徙其君康公于海上食一城秦伐韓宜陽㧞六城韓趙大敗楚師于大梁辛卯魯敗齊于平陸齊伐魏取襄陵壬辰秦伐魏侵晉癸巳齊田和㑹魏文侯于濁澤求為諸侯魏請于周及諸侯皆許之經世之丑二千二百二十二甲午周安王十五年秦惠公卒出子悼公繼韓烈侯卒子文侯繼魏文侯卒子武侯繼趙武侯卒烈侯子敬侯繼乙未田和稱諸侯于齊列于周紀魏攻趙邯鄲丙申韓伐鄭取陽城伐宋執宋公于彭城魏城安邑及王垣趙師破齊于靈丘齊太公和卒子桓公午繼秦庶長改殺出子及其母迎靈公之子于河西立之是謂獻公丁酉趙破齊師于廪丘戊戌魏敗趙師于兎臺己亥齊魏以衛伐趙取剛平庚子趙㑹楚伐魏取棘蒲楚悼王卒盗殺相呉起王子繼是謂肅王誅害呉起者七十餘家辛丑齊伐燕取桑丘壬寅齊康公死于海上齊桓侯卒子因齊立是謂威王癸卯晉孝公卒子静公俱酒繼韓趙魏伐齊至于靈丘甲辰韓文侯卒子哀侯繼趙攻中山戰于房子魯穆公卒子共公繼乙巳周安王崩太子喜嗣位是謂烈王魏武侯韓哀侯趙敬侯同滅晉而三分其地以靜公爲家人食端氏一城丙午韓滅鄭徙都之趙敬侯卒子成侯繼宋休公卒子辟公繼丁未戊申魯伐齊入陽關趙伐齊至博陵己酉衛㧞齊薛陵攻趙北藺趙㧞魏卿邑七十三宋辟公卒子剔成繼庚戌韓嚴弑其君哀侯立其子懿侯魏武侯卒公子争國趙伐魏立公子罃是謂惠王趙敗秦軍于鄗安辛亥趙伐齊至鄄魏敗趙師于覃懷齊威王烹阿夫夫封即墨大夫萬家楚肅王卒弟良夫繼是謂宣王壬子周烈王崩弟扁嗣位是謂顯王齊西敗趙魏之師于濁澤趙輸長城魏入觀齊魏敗韓于馬陵癸丑韓魏攻周甲寅趙韓分周為二乙卯魏㑹趙攻秦不利于洛陽丙辰齊攻秦不利于石門魏伐宋取儀臺丁巳周顯王西賀秦獻公魏與秦㑹于杜平戊午己未秦獻公卒子孝公繼敗魏師于少梁魏敗韓師于澮庚申魏㧞趙皮牢辛酉致文武胙于秦孝公東周君惠公卒子傑繼韓趙魏伐齊壬戌秦用衛鞅韓懿侯卒子昭侯繼癸亥經世之寅二千二百二十三甲子周顯王十二年宋取韓黄池齊封鄒忌為成侯乙丑趙㑹燕于河上㑹齊于平陸魯衛宋鄭朝魏丙寅魯共公卒子康公繼齊㑹趙于郊㑹魏于平陸㑹秦于杜平丁卯秦攻魏師于元里取少梁魏圍趙邯鄲戊辰韓攻東周君取陵觀及邢邱齊田忌孫臏救趙敗魏于桂陵是年齊始稱王己巳秦大良造衛鞅㑹韓趙之師圍魏襄陵庚午韓用申不害為相秦趙伐魏魏歸趙邯鄲盟于漳水之上辛未趙成侯卒世子繼是謂肅侯秦開阡陌大築冀闕于咸陽自雍徙都之壬申癸酉趙奪晉君端氏徙之屯留秦初為賦甲戌乙亥魯康公卒子景公繼丙子丁丑戊寅周顯王錫秦孝公命為伯齊威王卒子宣王辟疆繼己卯諸侯西賀秦庚辰齊人救韓田忌田嬰孫臏大敗魏師于馬陵獲將龎㳙及世子申辛巳楚宣王卒子威王繼秦奪魏河西七百里魏去安邑徙都大梁壬午癸未秦孝公卒子惠文君繼是謂惠王商鞅奔魏魏不受入于秦甲申秦惠文君夷商鞅族蘇秦入秦秦不受乙酉周顯王西賀秦孟軻為魏卿丙戌秦㧞韓宜陽魏惠王卒子襄王繼齊宣王㑹魏襄王于鄄丁亥蘇秦㑹趙燕韓魏齊楚六國之師盟于洹水之上以攻秦至于凾谷韓作高門是年楚滅越獲王無疆盡取其地東開地至浙江魏始稱王田嬰為相戊子燕文公卒子易王立韓昭侯卒子惠王立楚敗齊師于徐州齊田嬰詐楚故不利己丑齊㑹魏伐趙又伐燕取十城庚寅秦伐魏辛卯宋亂公弟偃弑其君代立是謂元王壬辰楚威王卒子懐王槐繼魏伐楚取陘山秦伐魏取汾隂癸巳秦用張儀為相陳軫適楚楚滅蜀魏輸秦上郡經世之卯二千二百二十四甲午周顯王四十二年齊㑹魏攻韓之桑邱乙未趙肅侯卒子定繼是謂武靈王齊用孟軻為上卿丙申孟軻去齊丁酉秦始稱王齊宣王卒子湣王地繼秦築上郡塞戊戌韓燕稱王楚破魏襄陵入城移兵攻齊秦張儀㑹齊楚執政于齧桑己亥秦張儀出相魏燕㑹韓魏二君于區鼠庚子周顯王崩子定嗣位是謂慎靚王是年趙始稱王齊封田嬰于薛盜殺蘇秦于齊蘇代復相燕燕王卒子噲繼子之專國蘇代使齊辛丑宋伐楚取地三百里始稱王秦齊交婚壬寅魏襄王卒子哀王繼張儀復相秦癸卯楚㑹齊趙韓魏燕攻秦不利齊獨後秦樗里疾大敗六國之師獲將申差及韓魏二公子甲辰齊敗魏師于觀津與秦争雄雌魯景公卒子平公繼秦敗韓師于濁澤韓請割名都一以助伐楚既而背之秦又伐韓敗韓師于岸門楚救不至燕王噲以國属子之乙巳齊伐燕秦伐趙㧞中都及西陽丙午周慎靚王崩子延繼是謂赧王稱西周君秦㧞義渠二十五城又取韓之石章丁未楚齊和親燕亂將市被攻子之不克返攻世子又不克死戊申楚攻秦不利秦伐齊楚救不至秦張儀結楚樗里疾攻趙己酉楚懷王大伐秦不利又伐又不利秦庶長魏章㑹齊韓之師大敗楚師于藍田又敗之于丹水之陽獲其將屈丐遂取漢中地置黔中郡韓宣王卒世子蒼繼是謂襄王齊以五都兵攻燕燕亂國人立太子平是謂昭王庚戌楚屈原使齊秦張儀使楚㑹楚㑹齊韓趙魏燕六國西事秦至咸陽而秦惠王卒子武王繼燕起金臺以禮郭隗樂毅自魏至鄒衍自齊至劇辛自趙至辛亥秦㑹魏于臨晉張儀魏章適衛樗里疾甘茂為相壬子楚合齊以善韓癸丑秦武王㑹魏哀王于應㑹韓襄王于臨晉甲寅東西二周君相攻楚圍韓之雍邱秦甘茂㧞韓之冝陽武王舉周鼎絶脈而死國人迎母弟稷于趙而立之是謂昭襄王太后臨朝稱制魏冉專政趙武靈王改用胡服乙卯秦復韓武遂嚴君疾向壽為相甘茂適魏丙辰楚絶齊以善秦丁巳秦昭王與楚懷王會于黃棘復之上庸戊午齊韓魏攻楚楚求救于秦魯平公卒子文公賈繼秦取韓武遂㧞魏蒲坂己未秦復魏蒲坂㑹韓于武遂庚申楚伐秦不利秦昭襄王㑹齊韓魏伐楚敗之于重邱辛酉齊孟嘗君入秦為質壬戌楚懷王放大夫屈原于江濵與秦昭襄王㑹于武關不復國人迎太子橫于齊而立之是謂頃襄王其弟子蘭為令尹齊歸秦涇陽君孟嘗君自秦逃歸秦㑹齊魏伐楚取八城趙㧞燕中山攘地北至燕代西至九源癸亥齊㑹韓魏伐秦至于函谷秦伐楚取十六城趙武靈王稱主父㑹羣臣于東宮廢太子章而授庶子何立是謂惠文王以肥義為之相北略地南入秦稱使者經世之辰二千二百二十五甲子周赧王十八年楚懷王于秦逃歸不克乙丑楚懷王卒于秦楚遂絶秦魏哀王卒子昭王繼齊㑹韓魏趙宋五國之兵攻秦至鹽氏而還秦與韓魏河北及封陵以和韓襄王卒子釐王繼趙主父滅中山徙其王于膚施封廢太子章于代號安陽君使田不禮為之相丙寅秦免樓緩相穰侯魏冉復相率師攻魏趙安陽君及不禮作難公子成及大夫李兊平之主父死于沙邱宮丁卯秦向夀伐韓㧞武始戊辰楚與秦復和韓伐秦不利秦左庶長白起大敗韓及諸侯之師于伊闕取城五坑軍二十四萬獲將公孫喜己巳楚逆婦于秦秦魏冉免相大良造白起伐魏取垣攻楚㧞宛庚午秦魏冉復相封陶邑司馬錯伐韓軹及鄧辛未齊有田甲之難免孟嘗君相魏獻河東地方四百里入秦韓獻武遂二百里入秦趙㑹齊伐韓壬申齊復孟嘗君相秦伐韓㧞六十一城癸酉齊秦約稱東西帝復罷甲戌齊孟嘗君謝病秦昭襄王廵漢中及上郡河北㧞魏新垣及曲陽乙亥齊滅宋至于泗上十二諸侯鄒魯之君皆稱臣南取楚之淮北西侵韓趙魏魏獻秦安邑秦伐魏之河内攻韓之夏山丙子齊孟嘗君以薛属魏秦昭襄王㑹楚頃襄王于宛㑹趙惠文王于中陽伐齊㧞九城丁丑燕樂毅㑹秦楚韓魏五國之師伐齊大敗齊師于濟西遂入臨菑㧞城七十拜樂毅上卿封昌國君留圍齊即墨及莒齊湣王保莒楚使淖齒救齊殺齊湣王于莒莒人立其子法章是謂襄王荀卿行祭酒戊寅楚頃襄王㑹秦昭襄王于鄢秦穰侯伐衛至于國己卯秦昭襄王㑹韓釐王于新城㑹魏昭王于新明伐趙㧞二城伐韓取六邑庚辰楚㑹魏趙伐秦秦伐楚魏冉復相趙使藺相如入秦獻璧辛巳楚割上庸及漢中請和于秦秦白起㧞趙二城司馬錯㧞楚上庸燕昭王卒子惠王繼以騎刼代樂毅樂毅奔趙趙惠文王與秦昭襄王㑹于澠池藺相如相壬午齊田單大敗燕君于即墨獲將騎刼復城七十迎襄王自莒入臨菑封田單安平君秦白起㧞楚西陵癸未楚頃襄王出奔陳郢陷于秦大良造白起破楚入郢燒夷陵以郢為南郡封起武安君甲申秦㧞楚巫及黔中作黔中郡魏昭王卒子安釐王繼乙酉楚東取江旁十五邑以扞秦魏㧞秦二城封無忌信陵君丙戌秦兵圍大梁魏入温請和秦以穰侯為相國韓暴䳒救魏不利趙亷頗㧞魏房子安陽丁亥魏芒卯攻韓不利秦師救韓敗趙魏之師十五萬于華陽魏入南陽請和以其地為南陽郡戊子韓釐王卒子桓惠王繼趙取東胡地己丑楚黃歇奉太子完入秦為質求平又取韓魏伐燕田單㧞燕中陽秦㑹楚韓趙魏伐燕燕惠王卒子武成王繼趙藺相如伐齊庚寅秦穰侯伐齊取剛壽以廣陶邑范雎自魏入秦辛卯秦師伐韓以逼周壬辰秦中更胡傷攻趙􅂒與趙奢擊之有功封馬服君與亷頗同位秦人為之少懼癸巳秦㧞魏懷義經世之巳二千二百二十六甲午周赧王四十八年秦太子卒于魏乙未秦㧞魏郪邱罷穰侯相國及宣太后權以客卿范雎為相封應侯魏冉就國趙惠文王卒子丹繼是謂孝成王太后專政丙申齊襄王卒子建繼田單攻趙秦以安國君為太子宣太后卒㧞趙三城進圍邯鄲趙出長安君為質于齊求救趙勝為相封平原君丁酉齊用田單為相秦白起伐韓㧞九城戊戌楚頃襄王卒太子完自秦亡歸繼是謂考烈王以左徒黃歇為令尹號春申君封于呉食淮北地秦白起㧞韓南郡己亥楚獻地于秦乞和秦五大夫賁伐韓㧞十五城以絶太行路韓馮亭以上黨入于趙趙受韓上黨亷頗軍長平庚子楚伐魯取徐州秦白起攻趙長平辛丑秦武安君大敗趙軍于長平進圍邯鄲趙以趙括代亷頗將長平遂陷兵四十萬為秦所坑壬寅秦分軍為三罷武安君白起將以王齕代攻趙㧞趙武安及皮牢司馬梗北定上黨趙使蘇代使秦癸卯秦加范雎相國王齕圍邯鄲張唐攻魏燕武成王卒子孝王繼趙平原君求救于楚魏甲辰楚春申君魏信陵君救趙秦起武安君白起不克殺之于杜郵乙巳周赧王㑹齊韓趙魏兵出伊闕攻秦不利西奔秦秦昭王滅周盡入其地三十六城徙其王于􅓆狐楚滅魯以齊荀卿為蘭陵令丙午秦徙周民及九鼎于咸陽蔡澤自燕入秦代范雎相燕孝王卒子喜繼丁未楚齊韓燕趙皆服于秦魏獨後秦使將軍樛伐之取呉城戊申秦郊上帝于雍邱趙徙都鉅鹿己酉趙平原君卒庚戌秦昭襄王卒太子安國繼是謂孝王立三日又卒子楚立是謂莊襄王以華陽夫人為后子政為太子吕不韋為丞相封文信侯食河南十萬户楚春申君入弔于秦燕將栗腹攻趙不利趙亷頗破燕軍于鄗封信平侯辛亥東周君㑹諸侯攻秦不利没于秦秦丞相吕不韋平東周盡入其地置三川郡徙其君于陽人趙亷頗伐燕圍其國壬子秦蒙驁㧞趙太原㧞韓滎陽及成臯癸丑秦蒙驁㧞魏高都又舉趙三十城楚齊魏韓燕趙攻秦不利甲寅秦莊襄王卒太子政繼是謂始皇帝以吕不韋為相國號仲父同太后專政李斯為舍人齊田單屠􅂓城魏無忌自趙歸國率楚齊韓趙燕五國之師敗秦軍于河外走蒙驁追至函谷乙卯秦蒙驁平晉陽丙辰趙孝成王卒子偃繼是謂悼襄王以樂乗代亷頗將頗奔魏丁巳秦蒙驁攻魏㧞二城攻韓㧞十二城戊午魏釐王卒子景湣王卒信陵君亦卒趙將李牧取燕二城己未秦㧞魏二十城置東郡趙伐燕獲將劇辛庚申楚考烈王㑹齊韓趙魏燕五國之兵伐秦至于函谷不利東徙都壽春春申君就國于呉辛酉秦㧞魏之汲趙㧞魏之鄴壬戌秦封嫪毒長信侯關政于内韓桓惠王卒子安繼癸亥長信侯嫪毒作難攻鄿年宮不克伏誅徙太后于雍流蜀者四千家楚考烈王卒子幽王悍繼經世之午二千二百二十七甲子秦始皇帝十年吕不韋坐嫪毒事免相李斯為相齊趙來置酒復華陽太后于甘泉宮乙丑秦王翦桓齮㧞趙九城趙悼襄王卒子遷繼秦兵攻鄴丙寅秦㑹魏伐楚及韓文信侯呂不韋自殺丁卯秦桓齮大敗趙軍十萬于平陽韓公子非使秦不還戊辰秦桓齮破趙宜安及赤巖韓王安朝秦己巳秦伐趙一軍攻鄴一軍攻狼孟燕太子丹自秦逃歸趙李牧扞秦有功庚午魏獻秦麗邑辛未秦内史勝滅韓獲其王以其地為潁川郡壬申秦王翦下井陘大破趙軍進圍鉅鹿趙以趙葱代李牧顔聚代司馬尚將癸酉秦王翦滅趙獲其王以其地為趙郡楚幽王卒母弟猶立庶兄負芻殺猶代立魏景湣王卒子假繼趙亡太子喜稱王于代㑹燕軍于上谷甲戌秦王翦破燕軍于易水燕荆軻使秦不還乙亥秦王翦王賁滅燕獲其太子丹剪謝病還拔楚城丙子秦王賁滅魏決河灌大梁獲其王丁丑秦王翦破楚殺其將項燕楚䘮師于蘄走壽春戊寅秦王翦蒙武滅楚獲其王以其地為楚郡己卯秦王賁平遼東獲燕王平代獲趙太子王翦定越以其地為㑹稽郡庚辰秦王翦滅齊獲其王以其地為齊郡東至海及朝鮮西至臨洮羌中南至北嚮户北至隂山遼東分天下地為三十六郡罷侯置守鑄天下兵為十二金人徙天下豪富十二萬户于咸陽大建宮室作阿房為萬世業稱始皇帝更以建亥月為歳首辛巳西廵狩至于隴右北地及回中乃復壬午東廵狩至于鄒嶧封太山禪梁甫南登琅邪丞相隗林王綰卿士李斯王戊五大夫趙嬰將軍楊樛及九侯勒帝功于金石表于海上遂南至于衡山浮江自南郡由武關乃復癸未東廵狩至博浪沙中遇盜遂登之罘刻石紀功北由上黨乃復甲申乙酉丙戌北廵狩至于碣石由上郡乃復使蒙恬擊胡取河南地丁亥南取陸梁地為桂林象郡又北斥匃奴自榆中並河以東属之隂山為三十四縣城河上為塞又使蒙恬渡河取高闕陶山北假中築亭障戊子置酒咸陽宮聚天下書焚之己丑聚天下學士于驪山坑之廣阿房宫自咸陽達于渭南庚寅辛卯南廵狩至于雲夢左丞相馮去疾留守右丞相李斯從行少子胡亥請行至九疑浮江東至于㑹稽又北至于琅邪由平原達沙丘崩左丞相李斯宦氏趙高假帝書更立少子胡亥賜上郡太子將軍蒙恬死遂還咸陽胡亥立是謂二世皇帝葬始皇帝驪山壬辰宦氏趙高為中郎令專政東廵狩至于㑹稽北又至于遼東乃復大殺王族及羣臣復廣阿房徴天下材士以五萬人為屯衛咸陽三百里不得食其榖戍卒陳勝稱王于楚關東郡邑皆殺其令長以應陳勝而西攻秦陳勝將武臣稱王于趙魏咎稱王于魏狄人田儋稱王于齊楚人項梁兵㑹稽徐人劉季稱兵豐沛陳勝兵西攻秦至于戲癸巳秦殺右丞相馮去疾將軍馮刼及囚左丞相李斯諫罷阿房故也將軍章邯滅陳勝于城父破項梁于定陶平田儋于臨濟渡河北攻趙田儋死其弟榮立儋子市為王陳勝將秦嘉立勝子景駒為王項梁殺景駒求楚懷王孫心立之保旴台項梁死其子羽軍彭城其將劉季軍碭山楚王心收項梁軍自旴台徙彭城以劉季為碭郡長封武安侯俾南略地而西攻秦以項羽為魯國公封長安侯俾北救趙而西攻秦約先入關者王經世之未二千二百二十八甲午秦二世三年中郎令趙高稱丞相殺李斯及弑其君胡亥于望夷宮代立不克立二世兄之子嬰為王嬰立夷趙高三族沛公兵十萬由武關入至咸陽秦子嬰降于軹道收圖籍封宮室府庫示衆人以約法三章還軍灞上以待東諸侯項羽北救趙殺大將軍宋義至鉅鹿大敗章邯軍于洹水秦軍降者二十萬悉坑之于新安合齊趙魏韓燕五國之兵四十萬由函谷而入㑹沛公于戲而屠咸陽殺子嬰收子女玉帛焚宫室府庫乙未項羽渝約自主封建立楚王心為義帝徙之江南都郴封沛公季為漢王遷之漢中都南鄭分秦關中為三一封降將張邯為雍王都廢邱一封降將司馬欣為塞王都櫟陽一封降將董翳為翟王都高奴分齊為三一封齊將田都為臨菑王都臨菑一封齊將田安為濟北王都博陽一封齊王田市為膠東王都即墨分楚為三一封楚將英布為九江王都六一封楚將共敖為臨江王都江陵一封番君呉芮為衡山王都邾分趙為二一封楚將張耳為常山王都襄國一封趙王歇為代王都鴈門分韓為二一封楚將申陽