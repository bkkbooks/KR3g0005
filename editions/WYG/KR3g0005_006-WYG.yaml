中山稱帝改元皇始凉呂光稱天王改元龍飛丁酉晉改元隆安兖州王恭豫州庾楷呉郡王欽各以城叛燕慕容寳北走龍城慕容詳稱帝中山慕容麟殺詳代立慕容徳自丁零入又殺麟代立徙居鄴中山陷于魏呂光冦西秦自金城復徙居苑川凉呂光將秃髪烏孤稱王亷川國曰凉元曰太初是謂南凉凉呂光將沮渠蒙遜立段業為牧于張掖國曰凉元曰神璽是謂北凉戊戌晉北伐燕師敗于管城兖州王恭豫州庾楷荆州殷仲堪廣州桓𤣥兵犯建業敗内師于白石假㑹稽王道子黃鉞𤣥師敗走潯陽杜冏以京口亂燕慕容寳南伐至于黎陽乃復將蘭汗殺寳代立于龍城稱昌黎王改元青龍寳子盛誅蘭汗稱王改元建平稱帝再改元長樂鄴陷于魏范陽王慕容徳自鄴南走滑臺稱王改元年是謂南燕魏㧞燕之鄴及信都改元天興自盛樂徙居平城凉秃髪烏孤克金城敗呂光于街亭稱武威天王己亥秦姚興㧞晉洛陽燕慕容徳㧞晉青州仇池楊盛稱藩于晉妖賊孫恩陷晉㑹稽晉謝琰劉牢之往伐劉裕始叅軍政秦姚興去帝號稱王改元洪始魏南攻滑臺涼呂光傳子紹位稱太上皇光卒兄纂殺紹代立凉秃髪烏孤徙居樂都烏孤卒弟利鹿孤立又徙居西平仍附于姚興凉叚業稱天王改元天璽大將沮渠蒙遜出守西安燕慕容徳逐辟閭渾于廣固徙居之滑臺没于魏庚子晉司馬劉裕敗孫恩于臨海以揚州元顯為十六州都督燕慕容盛去帝號稱庶人天王破高句麗秦姚興破西秦俘其王乞伏乾歸于長安凉呂纂改元咸寧大司馬吕宏殺纂不克凉利鹿孤改元建和凉將李暠稱牧秦州國曰凉元曰庚子是謂西凉燕慕容徳稱帝廣固改元建平辛丑晉平孫恩劉裕出守下邳燕慕容盛將叚璣行殺盛叔父熙誅璣稱帝改元光始秦姚興放乞伏乾歸還苑川凉吕超殺其君纂立其兄隆改元神鼎稱藩于姚興凉秃髪利鹿孤稱河西王凉大將沮渠蒙遜自西安入殺叚業代立改元永安壬寅晉改元元興桓𤣥據荆州建牙夏口假揚州元顯黄鉞顯軍敗𤣥入于建業稱侍中丞相録尚書事又稱太尉總百揆乃殺都督元顯及㑹稽王道子以瑯琊王德文為太宰改元大亨劉軌以冀州叛秦姚興伐呂光有功拒魏不利魏敗秦軍于蒙坑凉秃髪利鹿孤卒弟傉檀立改元𢎞昌徙居樂都凉沮渠蒙遜稱藩于姚興癸卯晉加桓𤣥九錫稱相國楚王用天子器服𤣥竊命徙其帝于永安宮降為平固王遷之潯陽改國曰楚元曰光始甲辰晉帝在潯陽劉裕唱義帥沛國劉毅東海何無忌二州兵大破桓𤣥兵于京口又敗𤣥將桓宏于廣陵呉甫之于江乗皇甫敷于羅落𤣥逼帝走江陵裕又敗𤣥兵于湓口𤣥復逼帝東下裕又敗𤣥兵于崢嶸洲又破之于覆舟山迎帝入江陵𤣥敗死子枚洄洲其將桓振復陷江陵幽帝譙縱以成都叛稱王秦姚興入十二郡脩貢于晉魏改元天錫凉呂隆奔姚興國亡凉傉檀去王號求姑臧于姚興燕慕容徳卒兄之子超立乙巳晉平桓振帝自江陵還建業改元義熙劉裕都督中外録尚書事還鎮丹徒凉傉檀受姚興命徙姑臧燕慕容超改元太上涼李暠徙居酒泉改元建初稱藩于晉丙午晉伐蜀敗譙縱于白帝孔安國為尚書左僕射大將軍劉裕開府京口仇池楊盛稱藩燕慕容超三將奔晉燕慕容熈將馮䟦殺熙立慕容雲復姓高氏稱王改元正始秦姚興將赫連勃勃稱天王于朔方國曰夏元曰龍昇丁未晉劉裕入朝殺東陽太守殷仲文南蠻校尉殷叔文晉陵太守殷道叔永嘉太守駱求姚興攻秃髪傉檀及赫連勃勃乞伏乾歸復稱王苑川改元更始凉秃髪傉檀攻沮渠蒙遜及赫連勃勃戊申晉劉裕入總朝政北敗慕容超于臨朐出大峴進圍廣固魏國亂后萬人同子申殺其君珪次子紹誅萬人及申自立是謂明帝魏史云賀大人及子如弑珪秦乾歸南攻姚興凉傉檀復稱王姑臧改元嘉平夏勃勃南攻姚興己酉晉劉裕滅南燕徙慕容超于建業後燕國亂苻將馮䟦用幸臣離班殺雲代立稱天王改元太平是謂北燕魏改元永興秦乾歸平枹罕夏赫連勃勃攻姚興庚戌晉始興賊盧循兵寇建業劉裕大破之循走潯陽再破之于豫章裕假黄鉞蜀兵陷巴東秦乞伏乾歸為兄之子公府所殺子熾磐誅公府而自立改元永康涼沮渠蒙遜攻李暠有功夏赫連勃勃攻姚興不利辛亥晉劉裕南敗盧循盧循走交州死劉毅以江陵叛涼沮渠蒙遜攻秃髮傉檀有功夏赫連勃勃攻姚興不克壬子晉劉裕殺劉藩及謝琨遂平劉毅于江陵凉傉檀徙居樂都姑臧陷于沮渠蒙遜涼蒙遜㧞秃髪傉檀姑臧徙居之稱西河王改元𢎞始癸丑晉朱齡石平蜀魏改元神瑞與秦姚興和親秦熾磐破土谷渾于澆河凉傉檀攻蒙遜不利夏改元鳯翔築統萬城甲寅秦乞伏熾磐滅南凉秃髮傉檀
