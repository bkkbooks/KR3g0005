body:
  text: 皇極經世書術數類一數學之屬提要臣等謹案皇極經世書十四卷宋邵雍撰邵子數學本於李挺之穆修而其源出於陳摶當李挺之初見邵子於百泉即授以義理性命之學其作皇極經世盖出於物理之學所謂易外别傳者是也其書以元經㑹以㑹經運以運經世起於帝堯甲辰至後周顯徳六年己未而興亡治亂之蹟皆以卦象推之朱子謂皇極是推步之書可謂能得其要領朱子又嘗謂自易以後無人做得一物如此整齊包括得盡又謂康節易看了却看别人的不得而張㟭亦謂此書本以天道質以人事辭約而義廣天下之能事畢矣盖自邵子始為此學其後自張行成祝泌等數家以外能明其理者甚鮮故世人卒莫窮其作用之所以然其起而議之者則曰元㑹運世之分無所依據十二萬九千餘年之説近於釋氏之刼數水火土石本於釋氏之地水火風且五行何以去金去木乾在易為天而經世為日兑在易為澤而經世為月以至離之為星震之為辰坤之為水艮之為火坎之為土巽之為石其取象多不與易相同俱難免於牽強不合然邵子在當日用以占驗無不竒中故厯代皆重其書且其自述大㫖亦不專於象數如云天下之事始過於重猶卒於輕始過於厚猶卒於薄又云學以人事為大又云治生於亂亂生於治聖人貴未然之防是謂易之大綱又云天下將治則人必尚義也天下將亂則人必尚利也尚義則謙讓之風行焉尚利則攘奪之風行焉類皆立義正大垂訓深切是經世一書雖明天道而實責成於人事洵粹然儒者之言固非䜟緯術數家所可同年而語也乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:574bcb7bd6261b0abe6391656034cc1d6aceb57d98e13edb9a37858626df1dc3
