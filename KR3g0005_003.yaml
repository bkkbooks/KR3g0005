  text: 皇極經世書卷三上宋邵雍撰觀物篇十三以㑹經運一經日之甲一經月之寅三開物始月寅之中經星之己七十六經星之庚七十七經星之辛七十八經星之壬七十九經星之癸八十經星之甲八十一經星之乙八十二經星之丙八十三經星之丁八十四經星之戊八十五經星之己八十六經星之庚八十七經星之辛八十八經星之壬八十九經星之癸九十經日之甲一經月之卯四經星之甲九十一經星之乙九十二經星之丙九十三經星之丁九十四經星之戊九十五經星之己九十六經星之庚九十七經星之辛九十八經星之壬九十九經星之癸一百經星之甲一百一經星之乙一百二經星之丙一百三經星之丁一百四經星之戊一百五經星之己一百六經星之庚一百七經星之辛一百八經星之壬一百九經星之癸一百十經星之甲一百十一經星之乙一百十二經星之丙一百十三經星之丁一百十四經星之戊一百十五經星之己一百十六經星之庚一百十七經星之辛一百十八經星之壬一百十九經星之癸一百二十經日之甲一經月之辰五經星之甲一百二十一經星之乙一百二十二經星之丙一百二十三經星之丁一百二十四經星之戊一百二十五經星之己一百二十六經星之庚一百二十七經星之辛一百二十八經星之壬一百二十九經星之癸一百三十經星之甲一百三十一經星之乙一百三十二經星之丙一百三十三經星之丁一百三十四經星之戊一百三十五經星之己一百三十六經星之庚一百三十七經星之辛一百三十八經星之壬一百三十九經星之癸一百四十經星之甲一百四十一經星之乙一百四十二經星之丙一百四十三經星之丁一百四十四經星之戊一百四十五經星之己一百四十六經星之庚一百四十七經星之辛一百四十八經星之壬一百四十九經星之癸一百五十經日之甲一經月之己六經星之甲一百五十一經星之乙一百五十二經星之丙一百五十三經星之丁一百五十四經星之戊一百五十五經星之己一百五十六經星之庚一百五十七經星之辛一百五十八經星之壬一百五十九經星之癸一百六十經星之甲一百六十一經星之乙一百六十二經星之丙一百六十三經星之丁一百六十四經星之戊一百六十五經星之己一百六十六經星之庚一百六十七經星之辛一百六十八經星之壬一百六十九經星之癸一百七十經星之甲一百七十一經星之乙一百七十二經星之丙一百七十三經星之丁一百七十四經星之戊一百七十五經星之己一百七十六經星之庚一百七十七經星之辛一百七十八經星之壬一百七十九觀物篇十四以㑹經運二經日之甲一經月之己六經星之癸一百八十經辰之子二千一百四十九甲子乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經辰之丑二千一百五十甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經辰之寅二千一百五十一甲子乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經辰之卯二千一百五十二甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經辰之辰二千一百五十三甲子乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經辰之巳二千一百五十四甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰乙巳丙午丁未戊申己酉庚戌辛亥壬子癸丑甲寅乙卯丙辰丁巳戊午己未庚申辛酉壬戌癸亥經辰之午二千一百五十五甲子乙丑丙寅丁卯戊辰己巳庚午辛未壬申癸酉甲戌乙亥丙子丁丑戊寅己卯庚辰辛巳壬午癸未甲申乙酉丙戌丁亥戊子己丑庚寅辛卯壬辰癸巳經辰之未二千一百五十六甲午乙未丙申丁酉戊戌己亥庚子辛丑壬寅癸卯甲辰唐堯乙巳二丙午三丁未四戊申五己酉六庚戌七辛亥八壬子九癸丑十甲寅十一乙卯十二丙辰十三丁巳十四戊午十五己未十六庚申十七辛酉十八壬戌十九癸亥二十經辰之申二千一百五十七甲子二十一乙丑二十二丙寅二十三丁卯二十四戊辰二十五己巳二十六庚午二十七辛未二十八壬申二十九癸酉三十甲戌三十一乙亥三十二丙子三十三丁丑三十四戊寅三十五己卯三十六庚辰三十七辛巳三十八壬午三十九癸未四十甲申四十一乙酉四十二丙戌四十三丁亥四十四戊子四十五己丑四十六庚寅四十七辛卯四十八壬辰四十九癸巳五十經辰之酉二千一百五十八甲午五十一乙未五十二丙申五十三丁酉五十四戊戌五十五己亥五十六庚子五十七辛丑五十八壬寅五十九癸卯六十甲辰六十一洪水方割命鯀治之乙巳六十二丙午六十三丁未六十四戊申六十五己酉六十六庚戌六十七辛亥六十八壬子六十九癸丑七十徵舜登庸甲寅七十一乙卯七十二薦舜于天命之位丙辰虞舜正月上日舜受命于文祖丁巳二戊午三己未四庚申五辛酉六壬戌七癸亥八經辰之戌二千一百五十九甲子九乙丑十丙寅十一丁卯十二戊辰十三己巳十四庚午十五辛未十六壬申十七癸酉十八甲戌十九乙亥二十丙子二十一丁丑二十二戊寅二十三己卯二十四庚辰二十五辛巳二十六壬午二十七癸未二十八帝堯殂落甲申二十九乙酉三十丙戌三十一月正元